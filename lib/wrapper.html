<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{META_DESCRIPTION}}">
  <title>{{PORTFOLIO_TITLE}}</title>

  <!-- All font families used across all 6 themes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Fraunces:ital,wght@0,300;0,400;0,700;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════════
       1 · THEME VARIABLES  (from themes.json)
    ══════════════════════════════════════════════ */
    {{THEME_CSS}}

    /* ══════════════════════════════════════════════
       2 · BASE DESIGN SYSTEM
    ══════════════════════════════════════════════ */
    {{BASE_CSS}}

    /* ══════════════════════════════════════════════
       3 · HARD RESET
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body, 'DM Sans', sans-serif);
      background: var(--bg, #07070f);
      color: var(--text, #f0f0ff);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════════════
       4 · ADAPTIVE THEME NORMALISATION
       Ensures every layout × theme combo is readable.
       Uses specificity + important only where needed.
    ══════════════════════════════════════════════ */

    /* Section backgrounds always inherit page bg */
    section {
      background: var(--bg);
    }

    /* ── Forms ───────────────────────────────── */
    input, textarea, select {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    input::placeholder, textarea::placeholder {
      color: var(--text-3) !important;
      opacity: 1;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent) !important;
      outline: none;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent) !important;
    }
    label {
      color: var(--text-2) !important;
    }

    /* ── Links ───────────────────────────────── */
    a { color: var(--accent); }

    /* ── Image/visual placeholder panels ─────── */
    [class*="-visual"], [class*="-img-wrap"],
    [class*="-right-panel"], [class*="-mockup"],
    [class*="-illustration"] {
      background: var(--surface) !important;
    }

    /* ══════════════════════════════════════════════
       5 · UNIVERSAL LOOP ELEMENT STYLES
       These classes are output by the template engine.
       They're fully theme-adaptive via CSS vars.
    ══════════════════════════════════════════════ */

    /* ── Skill chips ─────────────────────────── */
    .skill-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      border-radius: 40px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-2);
      font-family: var(--font-body, sans-serif);
      cursor: default;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      text-decoration: none;
    }
    .skill-chip::before {
      content: '';
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      opacity: 0.8;
    }
    .skill-chip:hover {
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      border-color: color-mix(in srgb, var(--accent) 55%, transparent);
      color: var(--text);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    /* ── Project cards ───────────────────────── */
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg, 14px);
      padding: 28px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .project-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 6%, transparent), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .project-card:hover::before { opacity: 1; }
    .project-card:hover {
      border-color: color-mix(in srgb, var(--accent) 55%, transparent);
      transform: translateY(-6px);
      box-shadow:
        0 4px 6px color-mix(in srgb, var(--accent) 4%, transparent),
        0 20px 50px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    .project-num {
      font-size: 11px;
      letter-spacing: 2.5px;
      color: var(--text-3);
      margin-bottom: 14px;
      font-family: var(--font-mono, monospace);
      text-transform: uppercase;
    }
    .project-name {
      font-size: 21px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
      font-family: var(--font-head, sans-serif);
    }
    .project-desc {
      font-size: 13.5px;
      color: var(--text-2);
      line-height: 1.75;
      margin-bottom: 18px;
    }
    .project-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }
    .stack-item {
      font-size: 10.5px;
      font-family: var(--font-mono, monospace);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      padding: 3px 10px;
      border-radius: 6px;
      letter-spacing: 0.3px;
    }
    .project-actions { display: flex; gap: 10px; margin-top: auto; }
    .btn-live {
      padding: 9px 20px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      font-family: var(--font-body, sans-serif);
      letter-spacing: 0.5px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-live:hover {
      background: var(--accent-2);
      transform: scale(1.04);
    }

    /* ── Cert cards ──────────────────────────── */
    .cert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg, 14px);
      padding: 24px 28px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .cert-card:hover {
      border-color: color-mix(in srgb, var(--accent) 50%, transparent);
      transform: translateY(-5px);
      box-shadow: 0 16px 48px color-mix(in srgb, var(--accent) 16%, transparent);
    }
    .cert-card:hover .cert-verify { opacity: 1; transform: translateX(0); }
    .cert-issuer-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .cert-issuer-name {
      font-size: 10.5px;
      color: var(--accent);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: var(--font-mono, monospace);
      font-weight: 600;
    }
    .cert-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 14px;
      font-family: var(--font-head, sans-serif);
    }
    .cert-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .cert-date {
      font-size: 11px;
      color: var(--text-3);
      font-family: var(--font-mono, monospace);
    }
    .cert-verify {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.5px;
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.25s;
    }

    /* Grid container for certs / projects when used as plain loops */
    .cert-card-grid, .projects-loop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .skills-loop-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* ══════════════════════════════════════════════
       6 · SCROLL & UX
    ══════════════════════════════════════════════ */
    [data-animate] {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    [data-animate].visible {
      opacity: 1;
      transform: translateY(0);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      [data-animate] { opacity: 1; transform: none; }
    }
    .scroll-top {
      position: fixed; bottom: 28px; right: 28px;
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); display: flex; align-items: center;
      justify-content: center; cursor: pointer;
      opacity: 0; visibility: hidden; transform: translateY(12px);
      transition: all 260ms cubic-bezier(0.4, 0, 0.2, 1); z-index: 300;
    }
    .scroll-top.visible { opacity: 1; visibility: visible; transform: translateY(0); }
    .scroll-top:hover { background: var(--accent); color: var(--bg); transform: translateY(-2px); }
  </style>
</head>

<body data-theme="{{ACTIVE_THEME}}">

  <!-- Navigation -->
  {{NAVIGATION}}

  <!-- Portfolio sections -->
  <main id="main-content">
    {{SECTIONS_BODY}}
  </main>

  <!-- Optional footer -->
  {{FOOTER}}

  <!-- Scroll to top -->
  <button id="craftScrollTop" class="scroll-top" aria-label="Back to top"
    onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <script>
    // Mobile viewport height fix
    const setVh = () => document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
    setVh();
    window.addEventListener('resize', setVh);

    // Scroll-to-top
    const sBtn = document.getElementById('craftScrollTop');
    window.addEventListener('scroll', () => sBtn.classList.toggle('visible', window.scrollY > 400), { passive: true });

    // Layout & animation JS
    {{ANIMATIONS_JS}}
  </script>
</body>
</html>
