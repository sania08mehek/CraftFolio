<style>
  .c1-contact { padding: 96px 60px; background: var(--bg); display: grid; grid-template-columns: 1fr 1.4fr; gap: 80px; align-items: start; }
  .c1-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 14px; }
  .c1-heading { font: 800 clamp(2rem,4vw,3.2rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1.5px; margin-bottom: 20px; }
  .c1-subtext { font: 400 14px/1.8 var(--font-body, sans-serif); color: var(--text-2); margin-bottom: 36px; }
  .c1-items { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius-lg, 16px); overflow: hidden; margin-bottom: 28px; }
  .c1-item { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: var(--surface); transition: all 0.2s; text-decoration: none; }
  .c1-item:hover { background: color-mix(in srgb, var(--accent) 8%, var(--surface)); padding-left: 26px; }
  .c1-item-icon { font-size: 1.2rem; }
  .c1-item-label { font: 10px var(--font-mono, monospace); color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
  .c1-item-val { font: 500 13px var(--font-body, sans-serif); color: var(--text); }
  .c1-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl, 24px); padding: 36px; }
  .c1-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .c1-form-group { margin-bottom: 16px; }
  .c1-form label { display: block; font: 10px var(--font-mono, monospace); color: var(--text-3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .c1-form input, .c1-form textarea {
    width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm, 8px);
    padding: 12px 16px; font: 14px var(--font-body, sans-serif);
  }
  .c1-form textarea { height: 130px; resize: vertical; }
  .c1-submit {
    width: 100%; padding: 15px; background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--radius-md, 12px); font: 700 14px var(--font-body, sans-serif);
    cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.25s;
  }
  .c1-submit:hover { background: var(--accent-2); transform: translateY(-2px); }
  @media (max-width: 768px) { .c1-contact { grid-template-columns: 1fr; } .c1-form-row { grid-template-columns: 1fr; } }
</style>
<section id="contact" class="c1-contact">
  <div>
    <div class="c1-eyebrow">Get In Touch</div>
    <h2 class="c1-heading">Let's Work Together</h2>
    <p class="c1-subtext">Open to new projects, freelance work, and interesting collaborations. I usually respond within 24 hours.</p>
    <div class="c1-items">
      <a class="c1-item" href="mailto:{{EMAIL}}">
        <span class="c1-item-icon">✉️</span>
        <div><div class="c1-item-label">Email</div><div class="c1-item-val">{{EMAIL}}</div></div>
      </a>
      <a class="c1-item" href="{{GITHUB}}" target="_blank" rel="noopener">
        <span class="c1-item-icon">🐙</span>
        <div><div class="c1-item-label">GitHub</div><div class="c1-item-val">{{GITHUB}}</div></div>
      </a>
      <a class="c1-item" href="{{LINKEDIN}}" target="_blank" rel="noopener">
        <span class="c1-item-icon">💼</span>
        <div><div class="c1-item-label">LinkedIn</div><div class="c1-item-val">{{LINKEDIN}}</div></div>
      </a>
    </div>
  </div>
  <div class="c1-form">
    <div class="c1-form-row">
      <div><label>Name</label><input type="text" placeholder="Your name"></div>
      <div><label>Email</label><input type="email" placeholder="you@email.com"></div>
    </div>
    <div class="c1-form-group"><label>Subject</label><input type="text" placeholder="Project inquiry"></div>
    <div class="c1-form-group"><label>Message</label><textarea placeholder="Tell me about your project..."></textarea></div>
    <button class="c1-submit">Send Message →</button>
  </div>
</section>
