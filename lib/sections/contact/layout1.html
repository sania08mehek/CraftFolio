<style>


input,
      textarea {
        width: 100%;
        background: transparent;
        outline: none;
        font-family: var(--font-body), sans-serif;
        transition: all 0.3s;
      }

      /* L1 MIDNIGHT */
      .l1-contact {
        background: var(--bg);
        min-height: 100vh;
        padding: 80px 60px;
        font-family: var(--font-head), sans-serif;
      }
      .l1-contact .eyebrow {
        font-size: 11px;
        letter-spacing: 4px;
        color: var(--success);
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .l1-contact .heading {
        font-size: 52px;
        font-weight: 800;
        color: var(--text);
        line-height: 1.1;

      .l1-contact .heading span {
        color: var(--success);

      .l1-contact .subtext {

      .l1-contact-inner {
        display: grid;
        grid-template-columns: 1fr 1.2fr;

        align-items: start;

      .l1-contact-info .info-label {

        letter-spacing: 3px;

        display: flex;
        align-items: center;

        transition: all 0.3s;

      .l1-contact-info .info-item:hover {
        padding-left: 8px;

      }

        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;

      .l1-contact-info .info-item .txt h4 {
        font-size: 11px;
        color: var(--text-3);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .l1-contact-info .info-item .txt span {
        font-size: 14px;
        color: var(--text);
      }
      .l1-contact-info .social-row {
        display: flex;
        gap: 10px;
        margin-top: 28px;
      }
      .l1-contact-info .soc-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid var(--border-2);
        background: transparent;
        color: var(--text-2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 16px;
      }
      .l1-contact-info .soc-btn:hover {
        border-color: var(--success);
        color: var(--success);
        background: color-mix(in srgb, var(--success) 8%, transparent);
      }
      .l1-form .form-group {
        margin-bottom: 20px;
      }
      .l1-form label {
        display: block;
        font-size: 10px;
        letter-spacing: 2px;
        color: var(--text-3);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .l1-form input,
      .l1-form textarea {
        border: 1px solid var(--border-2);
        border-radius: 10px;
        padding: 14px 16px;
        color: var(--text);
        font-size: 14px;
        background: var(--bg2);
      }
      .l1-form input:focus,
      .l1-form textarea:focus {
        border-color: var(--success);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--success) 8%, transparent);
      }
      .l1-form textarea {
        height: 120px;
        resize: vertical;
      }
      .l1-form .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .l1-form .submit-btn {
        width: 100%;
        padding: 14px;
        background: var(--success);
        color: var(--text);
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        font-family: var(--font-head), sans-serif;
        letter-spacing: 1px;
        transition: all 0.3s;
        margin-top: 4px;
      }
      .l1-form .submit-btn:hover {
        background: var(--success);
        transform: translateY(-2px);
        box-shadow: 0 16px 40px color-mix(in srgb, var(--success) 30%, transparent);
      }
