<style>
  .c2-contact { padding: 96px 60px; background: var(--bg); text-align: center; }
  .c2-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 14px; }
  .c2-heading { font: 800 clamp(2.5rem,6vw,5rem)/1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -2px; margin-bottom: 20px; }
  .c2-sub { font: 400 1rem/1.75 var(--font-body, sans-serif); color: var(--text-2); max-width: 520px; margin: 0 auto 48px; }
  .c2-form-wrap { max-width: 560px; margin: 0 auto; }
  .c2-form-group { margin-bottom: 16px; text-align: left; }
  .c2-form label { display: block; font: 10px var(--font-mono, monospace); color: var(--text-3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .c2-form input, .c2-form textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm, 8px); padding: 13px 18px; font: 14px var(--font-body, sans-serif); }
  .c2-form textarea { height: 120px; resize: vertical; }
  .c2-submit {
    width: 100%; padding: 16px; background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--radius-md, 12px); font: 700 14px var(--font-body, sans-serif);
    cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.25s; margin-top: 8px;
  }
  .c2-submit:hover { background: var(--accent-2); transform: translateY(-2px); }
  .c2-divider { display: flex; align-items: center; gap: 14px; margin: 36px 0; }
  .c2-divider-line { flex: 1; height: 1px; background: var(--border); }
  .c2-divider-text { font: 11px var(--font-mono, monospace); color: var(--text-3); letter-spacing: 2px; text-transform: uppercase; }
  .c2-links { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
  .c2-link { padding: 12px 24px; border: 1px solid var(--border-2); border-radius: var(--radius-sm, 8px); font: 500 13px var(--font-body, sans-serif); color: var(--text-2); text-decoration: none; transition: all 0.2s; }
  .c2-link:hover { border-color: var(--accent); color: var(--accent); }
</style>
<section id="contact" class="c2-contact">
  <div class="c2-eyebrow">Contact</div>
  <h2 class="c2-heading">Say Hello</h2>
  <p class="c2-sub">Have a project in mind or just want to talk? I'd love to hear from you.</p>
  <div class="c2-form-wrap">
    <div class="c2-form">
      <div class="c2-form-group"><label>Name</label><input type="text" placeholder="Your name"></div>
      <div class="c2-form-group"><label>Email</label><input type="email" placeholder="you@email.com"></div>
      <div class="c2-form-group"><label>Message</label><textarea placeholder="What would you like to discuss?"></textarea></div>
      <button class="c2-submit">Send Message</button>
    </div>
    <div class="c2-divider"><div class="c2-divider-line"></div><span class="c2-divider-text">or find me at</span><div class="c2-divider-line"></div></div>
    <div class="c2-links">
      <a class="c2-link" href="mailto:{{EMAIL}}">✉️ {{EMAIL}}</a>
      <a class="c2-link" href="{{GITHUB}}" target="_blank" rel="noopener">🐙 GitHub</a>
      <a class="c2-link" href="{{LINKEDIN}}" target="_blank" rel="noopener">💼 LinkedIn</a>
    </div>
  </div>
</section>
