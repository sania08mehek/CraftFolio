<style>


input,
      textarea {
        width: 100%;
        background: transparent;
        outline: none;
        font-family: var(--font-body), sans-serif;
        transition: all 0.3s;
      }

      /* L2 LIGHT */
      .l2-contact {
        background: var(--surface-2);
        min-height: 100vh;
        padding: 80px 60px;
        font-family: var(--font-body), sans-serif;
      }
      .l2-contact .header {
        margin-bottom: 60px;
      }
      .l2-contact .header .kicker {
        font-size: 11px;
        letter-spacing: 2px;
        color: var(--text-2);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .l2-contact .header .title {
        font-size: 56px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: -2px;
        line-height: 1;
      }
      .l2-contact-inner {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 80px;
      }
      .l2-form .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }
      .l2-form .form-group {
        margin-bottom: 16px;
      }
      .l2-form label {
        display: block;
        font-size: 12px;
        color: var(--text-2);
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }
      .l2-form input,
      .l2-form textarea {
        border: none;
        border-bottom: 1px solid var(--border);
        padding: 10px 0;
        color: var(--accent);
        font-size: 15px;
      }
      .l2-form input:focus,
      .l2-form textarea:focus {
        border-bottom-color: var(--accent);
      }
      .l2-form textarea {
        height: 100px;
        resize: none;
      }
      .l2-form .submit-btn {
        padding: 14px 40px;
        background: var(--accent);
        color: var(--surface-2);
        border: none;
        font-size: 13px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        font-family: var(--font-body), sans-serif;
        border-radius: 2px;
        transition: all 0.3s;
        margin-top: 8px;
      }
      .l2-form .submit-btn:hover {
        background: var(--accent-2);
      }
      .l2-sidebar .availability {
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
      }
      .l2-sidebar .availability .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .l2-sidebar .availability .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
        animation: pulse2 2s infinite;
      }
      @keyframes pulse2 {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .l2-sidebar .availability .status-text {
        font-size: 13px;
        font-weight: 600;
        color: var(--accent);
      }
      .l2-sidebar .availability p {
        font-size: 13px;
        color: var(--text-2);
        line-height: 1.6;
      }
      .l2-sidebar .contact-links {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .l2-sidebar .contact-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: 10px;
        text-decoration: none;
        transition: all 0.25s;
        cursor: pointer;
      }
      .l2-sidebar .contact-link:hover {
        border-color: var(--accent);
        transform: translateX(4px);
      }
      .l2-sidebar .contact-link .cl-icon {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: var(--surface-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .l2-sidebar .contact-link .cl-text h5 {
        font-size: 12px;
        color: var(--accent);
        font-weight: 600;
        margin-bottom: 1px;
      }
      .l2-sidebar .contact-link .cl-text span {
        font-size: 11px;
        color: var(--text-3);
      }
      .l2-sidebar .contact-link .arr {
        margin-left: auto;
        color: var(--text-3);
        font-size: 14px;
        transition: all 0.2s;
      }
      .l2-sidebar .contact-link:hover .arr {
        color: var(--accent);
      }


</style>

<section id="contact" class="l2-contact">
      <div class="header">
        <div class="kicker">Get in touch</div>
        <div class="title">Let's talk.</div>
      </div>
      <div class="l2-contact-inner">
        <div class="l2-form">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label><input type="text" placeholder="John" />
            </div>
            <div class="form-group">
              <label>Last Name</label><input type="text" placeholder="Doe" />
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label
            ><input type="email" placeholder="john@example.com" />
          </div>
          <div class="form-group">
            <label>Subject</label
            ><input type="text" placeholder="What's this about?" />
          </div>
          <div class="form-group">
            <label>Message</label
            ><textarea placeholder="Tell me more..."></textarea>
          </div>
          <button class="submit-btn">Send Message</button>
        </div>
        <div class="l2-sidebar">
          <div class="availability">
            <div class="status">
              <div class="dot"></div>
              <span class="status-text">Available for work</span>
            </div>
            <p>
              Currently open to freelance projects and full-time positions.
              Typically reply within 24 hours.
            </p>
          </div>
          <div class="contact-links">
            <div class="contact-link">
              <div class="cl-icon">✉️</div>
              <div class="cl-text">
                <h5>Email</h5>
                <span>{{EMAIL}}</span>
              </div>
              <span class="arr">↗</span>
            </div>
            <div class="contact-link">
              <div class="cl-icon">💼</div>
              <div class="cl-text">
                <h5>LinkedIn</h5>
                <span>{{LINKEDIN}}</span>
              </div>
              <span class="arr">↗</span>
            </div>
            <div class="contact-link">
              <div class="cl-icon">🐙</div>
              <div class="cl-text">
                <h5>GitHub</h5>
                <span>{{GITHUB}}</span>
              </div>
              <span class="arr">↗</span>
            </div>
            <div class="contact-link">
              <div class="cl-icon">𝕏</div>
              <div class="cl-text">
                <h5>Twitter / X</h5>
                <span>{{GITHUB}}</span>
              </div>
              <span class="arr">↗</span>
            </div>
          </div>
        </div>
      </div>
    </section>
