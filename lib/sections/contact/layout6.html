<style>
  .c3-contact {
    padding: 96px 60px; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .c3-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 14px; }
  .c3-heading { font: 800 clamp(2.5rem,7vw,5.5rem)/1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -3px; margin-bottom: 24px; }
  .c3-email {
    font: 700 clamp(1.1rem,2.5vw,1.8rem) var(--font-mono, monospace);
    color: var(--accent); text-decoration: none; border-bottom: 2px solid var(--accent);
    padding-bottom: 4px; margin-bottom: 48px; display: inline-block; transition: opacity 0.2s;
  }
  .c3-email:hover { opacity: 0.7; }
  .c3-links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .c3-link {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 28px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg, 16px); text-decoration: none;
    font: 500 14px var(--font-body, sans-serif); color: var(--text-2); transition: all 0.25s;
  }
  .c3-link:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 30px color-mix(in srgb, var(--accent) 20%, transparent); }
  .c3-divider { width: 64px; height: 2px; background: var(--accent); margin: 0 auto 28px; }
</style>
<section id="contact" class="c3-contact">
  <div class="c3-eyebrow">Let's Connect</div>
  <h2 class="c3-heading">Get In Touch</h2>
  <div class="c3-divider"></div>
  <a class="c3-email" href="mailto:{{EMAIL}}">{{EMAIL}}</a>
  <div class="c3-links">
    <a class="c3-link" href="{{GITHUB}}" target="_blank" rel="noopener"><span>🐙</span>GitHub</a>
    <a class="c3-link" href="{{LINKEDIN}}" target="_blank" rel="noopener"><span>💼</span>LinkedIn</a>
    <a class="c3-link" href="mailto:{{EMAIL}}"><span>✉️</span>Email</a>
  </div>
</section>
