<style>
  .nav3 {
    position: sticky; top: 0; z-index: 200;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between; height: 64px;
  }
  .nav3-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav3-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: n3p 2s infinite; }
  @keyframes n3p { 0%,100%{opacity:1} 50%{opacity:.3} }
  .nav3-name {
    font-family: var(--font-head, sans-serif); font-size: 18px; font-weight: 800; color: var(--text);
  }
  .nav3-links { display: flex; align-items: center; gap: 4px; }
  .nav1-link {
    padding: 7px 14px; border-radius: var(--radius-sm, 8px);
    font: 500 13px/1 var(--font-body, sans-serif);
    color: var(--text-2); text-decoration: none; transition: all 0.2s; white-space: nowrap;
  }
  .nav1-link:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
</style>
<nav id="navbar" class="nav3">
  <a class="nav3-brand" href="#hero">
    <span class="nav3-dot"></span>
    <span class="nav3-name">{{NAME}}</span>
  </a>
  <div class="nav3-links">{{NAV_LINKS}}</div>
</nav>
