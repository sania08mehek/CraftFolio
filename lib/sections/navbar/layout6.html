<!-- NAVBAR · Layout 6 · 3D Depth (Bold Gold Dark) -->
<!-- Placeholders: {{NAME}} {{NAV_LINKS}} -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap" rel="stylesheet">

<style>
  .nav6 {
    position: sticky; top: 0; z-index: 100;
    background: #0f0a1e;
    font-family: 'Outfit', sans-serif;
    box-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }
  .nav6-stripe {
    height: 3px;
    background: linear-gradient(90deg, #ffc832, #ff6b35, #ffc832);
    background-size: 200% 100%;
    animation: goldShimmer 3s linear infinite;
  }
  @keyframes goldShimmer {
    0%   { background-position: 0% 0; }
    100% { background-position: 200% 0; }
  }
  .nav6-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 44px; height: 64px;
  }
  .nav6-logo {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 21px; letter-spacing: 0.04em;
    text-decoration: none; color: #fff8e8;
    position: relative;
  }
  .nav6-logo span {
    color: #ffc832;
    text-shadow: 0 0 15px rgba(255,200,50,0.5);
  }
  .nav6-links { display: flex; align-items: center; gap: 4px; }
  .nav6-link {
    color: rgba(255,248,232,0.5); text-decoration: none;
    font-size: 13px; font-weight: 500; padding: 7px 15px;
    border-radius: 8px; transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .nav6-link:hover {
    color: #ffc832; background: rgba(255,200,50,0.08);
  }
  .nav6-cta {
    margin-left: 8px; padding: 8px 22px;
    background: linear-gradient(135deg, #ffc832, #ff6b35);
    color: #0f0a1e; font-weight: 700; font-size: 13px;
    text-decoration: none; border-radius: 8px;
    box-shadow: 0 4px 20px rgba(255,200,50,0.35),
                0 8px 30px rgba(255,107,53,0.2);
    transition: all 0.2s; letter-spacing: 0.03em;
  }
  .nav6-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,200,50,0.5), 0 12px 40px rgba(255,107,53,0.3);
  }
</style>

<nav class="nav6">
  <div class="nav6-stripe"></div>
  <div class="nav6-inner">
    <a class="nav6-logo" href="#"><span>◆</span> {{NAME}}</a>
    <div class="nav6-links">
      {{NAV_LINKS}}
      <a class="nav6-cta" href="#contact">Hire Me</a>
    </div>
  </div>
</nav>
