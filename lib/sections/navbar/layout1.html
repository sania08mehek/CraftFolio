<style>
  .nav1 {
    position: sticky; top: 0; z-index: 200;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; gap: 24px;
  }
  .nav1-logo {
    font-family: var(--font-head, sans-serif); font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    white-space: nowrap; text-decoration: none; flex-shrink: 0;
  }
  .nav1-links { display: flex; align-items: center; gap: 2px; flex-wrap: wrap; justify-content: center; }
  .nav1-link {
    padding: 7px 14px; border-radius: var(--radius-sm, 8px);
    font-family: var(--font-body, sans-serif); font-size: 13px; font-weight: 500;
    color: var(--text-2); text-decoration: none; transition: all 0.2s; white-space: nowrap;
  }
  .nav1-link:hover { color: var(--text); background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .nav1-cta {
    flex-shrink: 0; padding: 9px 22px;
    background: var(--accent); color: var(--bg);
    border-radius: var(--radius-sm, 8px); font-family: var(--font-body, sans-serif);
    font-size: 13px; font-weight: 700; text-decoration: none; transition: 0.2s;
    white-space: nowrap; letter-spacing: 0.4px;
  }
  .nav1-cta:hover { background: var(--accent-2); transform: translateY(-1px); }
</style>
<nav id="navbar" class="nav1">
  <a class="nav1-logo" href="#hero">{{NAME}}</a>
  <div class="nav1-links">{{NAV_LINKS}}</div>
  <a class="nav1-cta" href="#contact">Hire Me</a>
</nav>
