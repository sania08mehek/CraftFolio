<!-- NAVBAR · Layout 1 · Midnight Dark -->
<!-- Placeholders: {{NAME}} {{NAV_LINKS}} -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  .nav1 {
    position: sticky; top: 0; z-index: 100;
    background: rgba(7,7,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(99,102,241,0.18);
    font-family: 'Syne', sans-serif;
  }
  .nav1-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 64px;
  }
  .nav1-logo {
    font-size: 20px; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    text-decoration: none;
  }
  .nav1-links { display: flex; align-items: center; gap: 8px; }
  .nav1-link {
    color: rgba(240,240,255,0.5); text-decoration: none;
    font-size: 13px; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 8px 14px; border-radius: 8px;
    transition: all 0.2s; position: relative;
  }
  .nav1-link:hover { color: #fff; background: rgba(99,102,241,0.12); }
  .nav1-link.active { color: #a78bfa; }
  .nav1-dot {
    width: 6px; height: 6px; background: #6366f1; border-radius: 50%;
    animation: pulse1 2s infinite;
  }
  @keyframes pulse1 {
    0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)}
  }
  .nav1-cta {
    padding: 8px 20px; background: linear-gradient(135deg,#6366f1,#8b5cf6);
    border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600;
    text-decoration: none; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(99,102,241,0.3);
  }
  .nav1-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.45); }
</style>

<nav class="nav1">
  <div class="nav1-inner">
    <a class="nav1-logo" href="#">{{NAME}}</a>
    <div class="nav1-links">
      <div class="nav1-dot"></div>
      {{NAV_LINKS}}
      <a class="nav1-cta" href="#contact">Hire Me</a>
    </div>
  </div>
</nav>
