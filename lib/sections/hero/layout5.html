<style>
  .h2-hero {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center;
    min-height: 92vh; padding: 80px 40px; background: var(--bg);
  }
  .h2-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px; border: 1px solid var(--border);
    border-radius: 30px; background: color-mix(in srgb, var(--accent) 8%, transparent);
    font: 11px var(--font-mono, monospace); color: var(--accent);
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 36px;
  }
  .h2-eyebrow::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); animation:h2p 2s infinite; }
  @keyframes h2p { 0%,100%{opacity:1} 50%{opacity:.3} }
  .h2-greeting { font: 400 1.5rem var(--font-body, sans-serif); color: var(--text-2); margin-bottom: 12px; }
  .h2-name {
    font: 800 clamp(3.5rem,9vw,7rem)/1 var(--font-head, sans-serif);
    letter-spacing: -4px; margin-bottom: 24px;
    background: linear-gradient(135deg, var(--text), var(--accent-2));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .h2-title { font: 500 1.2rem var(--font-body, sans-serif); color: var(--accent); margin-bottom: 28px; }
  .h2-bio {
    font: 400 1.05rem/1.8 var(--font-body, sans-serif);
    color: var(--text-2); max-width: 600px; margin: 0 auto 44px;
  }
  .h2-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 60px; }
  .h2-btn-p {
    padding: 15px 36px; background: var(--accent); color: var(--bg);
    border-radius: 50px; font: 700 14px var(--font-body, sans-serif);
    text-decoration: none; letter-spacing: 0.5px;
    transition: all 0.25s; display: inline-block;
  }
  .h2-btn-p:hover { background: var(--accent-2); transform: translateY(-2px); box-shadow: 0 12px 30px color-mix(in srgb, var(--accent) 30%, transparent); }
  .h2-btn-s {
    padding: 15px 36px; background: transparent; color: var(--text);
    border: 1px solid var(--border-2); border-radius: 50px;
    font: 500 14px var(--font-body, sans-serif); text-decoration: none;
    transition: all 0.25s; display: inline-block;
  }
  .h2-btn-s:hover { border-color: var(--accent); color: var(--accent); }
  .h2-stats {
    display: flex; gap: 48px; justify-content: center;
    padding: 28px 40px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-xl, 24px); flex-wrap: wrap;
  }
  .h2-stat-num { font: 800 2.5rem/1 var(--font-head, sans-serif); color: var(--accent); display: block; }
  .h2-stat-label { font: 13px var(--font-body, sans-serif); color: var(--text-3); margin-top: 6px; display: block; }
</style>
<section id="hero" class="h2-hero">
  <div class="h2-eyebrow">Available for work</div>
  <p class="h2-greeting">Hello, I'm</p>
  <h1 class="h2-name">{{NAME}}</h1>
  <div class="h2-title">{{TITLE}}</div>
  <p class="h2-bio">{{BIO}}</p>
  <div class="h2-btns">
    <a class="h2-btn-p" href="#projects">View My Work →</a>
    <a class="h2-btn-s" href="#contact">Say Hello ↗</a>
  </div>
  <div class="h2-stats">
    <div><span class="h2-stat-num">5+</span><span class="h2-stat-label">Years Experience</span></div>
    <div><span class="h2-stat-num">40+</span><span class="h2-stat-label">Projects Delivered</span></div>
    <div><span class="h2-stat-num">100%</span><span class="h2-stat-label">Client Satisfaction</span></div>
  </div>
</section>
