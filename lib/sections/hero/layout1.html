<style>
  .h1-hero {
    display: grid; grid-template-columns: 1fr 1fr;
    min-height: 92vh; align-items: center;
    padding: 80px 60px; background: var(--bg); gap: 60px;
  }
  .h1-eyebrow {
    font: 11px/1 var(--font-mono, monospace); color: var(--accent);
    letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .h1-eyebrow::before {
    content:''; display:block; width:28px; height:1px; background:var(--accent);
  }
  .h1-name {
    font: 800 clamp(3rem,6vw,5.5rem)/1 var(--font-head, sans-serif);
    color: var(--text); letter-spacing: -2px; margin-bottom: 14px;
  }
  .h1-title {
    font: 500 1.15rem var(--font-body, sans-serif);
    color: var(--accent-2); margin-bottom: 22px; letter-spacing: 0.3px;
  }
  .h1-bio {
    font: 400 1rem/1.8 var(--font-body, sans-serif);
    color: var(--text-2); max-width: 480px; margin-bottom: 40px;
  }
  .h1-btns { display: flex; gap: 14px; flex-wrap: wrap; }
  .h1-btn-p {
    padding: 14px 32px; background: var(--accent); color: var(--bg);
    border-radius: var(--radius-md, 12px); font: 700 14px var(--font-body, sans-serif);
    text-decoration: none; letter-spacing: 0.5px;
    transition: all 0.25s; display: inline-block;
  }
  .h1-btn-p:hover { background: var(--accent-2); transform: translateY(-2px); box-shadow: 0 12px 30px color-mix(in srgb, var(--accent) 30%, transparent); }
  .h1-btn-s {
    padding: 14px 32px; background: transparent; color: var(--text);
    border: 1px solid var(--border-2); border-radius: var(--radius-md, 12px);
    font: 500 14px var(--font-body, sans-serif); text-decoration: none;
    transition: all 0.25s; display: inline-block;
  }
  .h1-btn-s:hover { border-color: var(--accent); color: var(--accent); }
  .h1-right { display: flex; flex-direction: column; gap: 16px; }
  .h1-card {
    padding: 20px 24px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg, 16px); transition: transform 0.3s;
  }
  .h1-card:hover { transform: translateX(6px); }
  .h1-card-label {
    font: 10px/1 var(--font-mono, monospace); color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
  }
  .h1-card-value { font: 700 1rem/1 var(--font-head, sans-serif); color: var(--text); }
  .h1-card-sub { font: 400 12px var(--font-body, sans-serif); color: var(--text-2); margin-top: 4px; }
  .h1-avail {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 20px; background: color-mix(in srgb, var(--success) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--success) 30%, transparent);
    border-radius: var(--radius-md, 12px); margin-top: 8px;
  }
  .h1-avail-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: h1p 2s infinite; }
  @keyframes h1p { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.2)} }
  .h1-avail-text { font: 500 13px var(--font-body, sans-serif); color: var(--text-2); }
  @media (max-width: 768px) {
    .h1-hero { grid-template-columns: 1fr; }
    .h1-right { display: none; }
  }
</style>
<section id="hero" class="h1-hero" data-animate>
  <div>
    <div class="h1-eyebrow">Portfolio · 2025</div>
    <h1 class="h1-name">{{NAME}}</h1>
    <div class="h1-title">{{TITLE}}</div>
    <p class="h1-bio">{{BIO}}</p>
    <div class="h1-btns">
      <a class="h1-btn-p" href="#projects">See My Work →</a>
      <a class="h1-btn-s" href="#contact">Get In Touch</a>
    </div>
  </div>
  <div class="h1-right">
    <div class="h1-card">
      <div class="h1-card-label">Current Role</div>
      <div class="h1-card-value">{{TITLE}}</div>
      <div class="h1-card-sub">Open to new opportunities</div>
    </div>
    <div class="h1-card">
      <div class="h1-card-label">Expertise</div>
      <div class="h1-card-value">Full Stack Development</div>
      <div class="h1-card-sub">Frontend · Backend · DevOps</div>
    </div>
    <div class="h1-card">
      <div class="h1-card-label">Location</div>
      <div class="h1-card-value">Remote Worldwide</div>
      <div class="h1-card-sub">Available for freelance & full-time</div>
    </div>
    <div class="h1-avail">
      <div class="h1-avail-dot"></div>
      <span class="h1-avail-text">Open to new projects &amp; roles</span>
    </div>
  </div>
</section>
