<style>
  .h3-hero {
    min-height: 92vh; display: flex; flex-direction: column;
    justify-content: center; padding: 80px 64px; background: var(--bg);
    position: relative; overflow: hidden;
  }
  .h3-hero::before {
    content: attr(data-name);
    position: absolute; right: -2%; top: 50%; transform: translateY(-50%);
    font: 900 22vw/1 var(--font-head, sans-serif); color: var(--surface);
    pointer-events: none; user-select: none; white-space: nowrap; letter-spacing: -8px;
  }
  .h3-index {
    font: 11px var(--font-mono, monospace); color: var(--text-3);
    letter-spacing: 4px; text-transform: uppercase; margin-bottom: 48px;
  }
  .h3-role {
    font: 500 1rem var(--font-mono, monospace); color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;
  }
  .h3-name {
    font: 800 clamp(3rem,7vw,6.5rem)/1 var(--font-head, sans-serif);
    color: var(--text); letter-spacing: -3px; margin-bottom: 32px; max-width: 700px;
  }
  .h3-line { width: 60px; height: 2px; background: var(--accent); margin-bottom: 28px; }
  .h3-bio {
    font: 400 1rem/1.85 var(--font-body, sans-serif);
    color: var(--text-2); max-width: 520px; margin-bottom: 44px;
  }
  .h3-btns { display: flex; gap: 14px; flex-wrap: wrap; }
  .h3-btn-p {
    padding: 13px 30px; background: var(--accent); color: var(--bg);
    border-radius: var(--radius-sm, 8px); font: 700 13px var(--font-body, sans-serif);
    text-decoration: none; letter-spacing: 0.5px; transition: all 0.25s;
  }
  .h3-btn-p:hover { background: var(--accent-2); transform: translateY(-2px); }
  .h3-btn-s {
    padding: 13px 30px; background: transparent; color: var(--text-2);
    font: 500 13px var(--font-body, sans-serif); text-decoration: none;
    transition: color 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .h3-btn-s:hover { color: var(--accent); }
  .h3-scroll {
    position: absolute; bottom: 32px; left: 64px;
    display: flex; align-items: center; gap: 12px;
    font: 11px var(--font-mono, monospace); color: var(--text-3);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .h3-scroll-line { width: 48px; height: 1px; background: var(--text-3); }
</style>
<section id="hero" class="h3-hero" data-name="{{NAME}}">
  <div class="h3-index">Portfolio — 2025</div>
  <div class="h3-role">{{TITLE}}</div>
  <h1 class="h3-name">{{NAME}}</h1>
  <div class="h3-line"></div>
  <p class="h3-bio">{{BIO}}</p>
  <div class="h3-btns">
    <a class="h3-btn-p" href="#projects">See My Work →</a>
    <a class="h3-btn-s" href="#contact">Let's Talk ↗</a>
  </div>
  <div class="h3-scroll"><div class="h3-scroll-line"></div>Scroll to explore</div>
</section>
