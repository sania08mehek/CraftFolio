<!-- HERO · Layout 4 · Aurora Dark -->
<!-- Placeholders: {{NAME}} {{TITLE}} {{BIO}} {{PROFILE_IMAGE}} -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  .hero4 {
    background: #04080f;
    min-height: 92vh; display: flex; align-items: center;
    padding: 80px 48px; position: relative; overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  /* aurora background */
  .hero4-aurora {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(
      130deg,
      rgba(56,189,248,0.08) 0%,
      rgba(167,139,250,0.06) 30%,
      rgba(244,114,182,0.06) 60%,
      rgba(56,189,248,0.04) 100%
    );
    background-size: 400% 400%;
    animation: auroraMove 12s ease infinite;
  }
  @keyframes auroraMove {
    0%,100%{ background-position: 0% 50%; }
    50%     { background-position: 100% 50%; }
  }
  /* soft particle dots */
  .hero4-particle {
    position: absolute; border-radius: 50%; pointer-events: none;
  }
  .hero4-p1 { width:4px;height:4px;background:#38bdf8;opacity:0.6;top:20%;left:15%;animation:twinkle 3s infinite; }
  .hero4-p2 { width:3px;height:3px;background:#a78bfa;opacity:0.5;top:35%;right:20%;animation:twinkle 4s 1s infinite; }
  .hero4-p3 { width:5px;height:5px;background:#f472b6;opacity:0.4;bottom:30%;left:25%;animation:twinkle 2.5s 0.5s infinite; }
  .hero4-p4 { width:3px;height:3px;background:#38bdf8;opacity:0.5;bottom:20%;right:35%;animation:twinkle 3.5s 2s infinite; }
  .hero4-p5 { width:4px;height:4px;background:#a78bfa;opacity:0.4;top:60%;left:50%;animation:twinkle 4s 0.8s infinite; }
  @keyframes twinkle {
    0%,100%{opacity:0.1;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.5)}
  }
  .hero4-inner {
    max-width: 1100px; margin: 0 auto; width: 100%;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center; position: relative; z-index: 1;
  }
  .hero4-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: #38bdf8; letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 20px;
    animation: fadeUp4 0.6s ease both;
  }
  .hero4-eyebrow::before {
    content: ''; width: 28px; height: 1px; background: #38bdf8;
  }
  @keyframes fadeUp4 { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .hero4-h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(36px, 5vw, 62px); font-weight: 700;
    line-height: 1.1; letter-spacing: -0.02em; color: #e8f4ff;
    animation: fadeUp4 0.6s 0.1s ease both;
  }
  .hero4-h1 em {
    font-style: italic; color: #38bdf8;
    text-shadow: 0 0 30px rgba(56,189,248,0.4);
  }
  .hero4-role {
    font-size: 16px; color: rgba(232,244,255,0.45);
    margin-top: 12px; font-weight: 300; letter-spacing: 0.03em;
    animation: fadeUp4 0.6s 0.2s ease both;
  }
  .hero4-bio {
    font-size: 16px; color: rgba(232,244,255,0.45);
    line-height: 1.8; max-width: 480px; margin-top: 20px;
    animation: fadeUp4 0.6s 0.3s ease both;
  }
  .hero4-actions {
    display: flex; gap: 14px; margin-top: 36px;
    animation: fadeUp4 0.6s 0.4s ease both;
  }
  .hero4-btn-p {
    padding: 14px 32px;
    background: linear-gradient(135deg, rgba(56,189,248,0.9), rgba(167,139,250,0.9));
    border: none; color: #04080f; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    box-shadow: 0 6px 25px rgba(56,189,248,0.35);
    transition: all 0.2s; text-decoration: none; display: inline-block;
  }
  .hero4-btn-p:hover {
    transform: translateY(-2px); box-shadow: 0 12px 40px rgba(56,189,248,0.5);
  }
  .hero4-btn-s {
    padding: 14px 32px; background: transparent;
    border: 1px solid rgba(56,189,248,0.25); color: rgba(232,244,255,0.7);
    border-radius: 10px; font-size: 14px; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s;
    text-decoration: none; display: inline-block;
  }
  .hero4-btn-s:hover { border-color: #38bdf8; color: #38bdf8; }
  /* right side - profile with aurora ring */
  .hero4-right { display: flex; align-items: center; justify-content: center; }
  .hero4-profile-wrap {
    position: relative; width: 320px; height: 320px;
  }
  .hero4-ring {
    position: absolute; inset: -12px; border-radius: 50%;
    background: conic-gradient(from 0deg, #38bdf8, #a78bfa, #f472b6, #38bdf8);
    animation: rotateSlow4 6s linear infinite; opacity: 0.6;
  }
  @keyframes rotateSlow4 { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .hero4-ring-mask {
    position: absolute; inset: 4px; border-radius: 50%; background: #04080f;
  }
  .hero4-avatar {
    position: absolute; inset: 12px; border-radius: 50%; overflow: hidden;
    background: linear-gradient(135deg, #0c1525, #07131f);
  }
  .hero4-avatar img {
    width: 100%; height: 100%; object-fit: cover;
  }
  /* floating info cards */
  .hero4-tag-card {
    position: absolute; background: rgba(12,21,37,0.9);
    backdrop-filter: blur(12px); border: 1px solid rgba(56,189,248,0.2);
    border-radius: 10px; padding: 10px 16px;
    font-size: 13px; color: #e8f4ff; white-space: nowrap;
    animation: floatCard4 4s ease-in-out infinite;
  }
  .hero4-tag-card.pos1 { top: -10px; right: -20px; animation-delay: 0s; }
  .hero4-tag-card.pos2 { bottom: 20px; left: -30px; animation-delay: 2s; }
  @keyframes floatCard4 {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
  }
  .hero4-tag-card span { color: #38bdf8; margin-right: 6px; }
</style>

<section class="hero4">
  <div class="hero4-aurora"></div>
  <div class="hero4-particle hero4-p1"></div>
  <div class="hero4-particle hero4-p2"></div>
  <div class="hero4-particle hero4-p3"></div>
  <div class="hero4-particle hero4-p4"></div>
  <div class="hero4-particle hero4-p5"></div>

  <div class="hero4-inner">
    <div>
      <div class="hero4-eyebrow">Full Stack Developer</div>
      <h1 class="hero4-h1">
        I'm <em>{{NAME}}</em>,<br>
        I build digital<br>experiences.
      </h1>
      <p class="hero4-role">{{TITLE}} · Open to Opportunities</p>
      <p class="hero4-bio">{{BIO}}</p>
      <div class="hero4-actions">
        <a class="hero4-btn-p" href="#projects">My Work</a>
        <a class="hero4-btn-s" href="#contact">Contact</a>
      </div>
    </div>
    <div class="hero4-right">
      <div class="hero4-profile-wrap">
        <div class="hero4-ring"></div>
        <div class="hero4-ring-mask"></div>
        <div class="hero4-avatar">
          <img src="{{PROFILE_IMAGE}}" alt="{{NAME}}" onerror="this.style.display='none'" />
        </div>
        <div class="hero4-tag-card pos1"><span>✦</span> {{TITLE}}</div>
        <div class="hero4-tag-card pos2"><span>▲</span> 5+ years exp.</div>
      </div>
    </div>
  </div>
</section>
