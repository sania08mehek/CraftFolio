<style>
  .pr1 { padding: 96px 60px; background: var(--bg); }
  .pr1-header { margin-bottom: 48px; }
  .pr1-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; }
  .pr1-heading { font: 800 clamp(2.2rem,5vw,3.5rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1.5px; margin-bottom: 14px; }
  .pr1-sub { font: 400 1rem/1.75 var(--font-body, sans-serif); color: var(--text-2); max-width: 540px; }
  .pr1-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
</style>
<section id="projects" class="pr1">

    <div class="pr1-eyebrow">Work</div>

  </div>
  <div class="pr1-grid">{{PROJECTS_LOOP}}</div>
