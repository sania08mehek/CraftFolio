<style>
  .pr2 { padding: 96px 60px; background: var(--bg); }
  .pr2-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px; flex-wrap: wrap; gap: 20px; }
  .pr2-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; }
  .pr2-heading { font: 800 clamp(2rem,4vw,3rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1.5px; }
  .pr2-cta { padding: 11px 24px; border: 1px solid var(--border-2); border-radius: var(--radius-sm, 8px); font: 500 13px var(--font-body, sans-serif); color: var(--text-2); text-decoration: none; transition: all 0.2s; }
  .pr2-cta:hover { border-color: var(--accent); color: var(--accent); }
  .pr2-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  @media (max-width: 768px) { .pr2-grid { grid-template-columns: 1fr; } }
</style>
<section id="projects" class="pr2">
  <div class="pr2-header">
    <div>
      <div class="pr2-eyebrow">Portfolio</div>
      <h2 class="pr2-heading">My Work</h2>
    </div>
    <a class="pr2-cta" href="{{GITHUB}}" target="_blank" rel="noopener">All on GitHub ↗</a>
  </div>
  <div class="pr2-grid">{{PROJECTS_LOOP}}</div>
</section>
