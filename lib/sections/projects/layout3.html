<style>
  .pr3 { padding: 96px 60px; background: var(--bg); }
  .pr3-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; }
  .pr3-heading { font: 800 clamp(2.2rem,5vw,3.5rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1.5px; margin-bottom: 48px; }
  .pr3-list { display: flex; flex-direction: column; gap: 16px; }
  /* Override card to horizontal layout */
  .pr3-list .project-card { display: grid; grid-template-columns: auto 1fr auto; gap: 24px; align-items: center; }
  .pr3-list .project-num { font: 700 3rem/1 var(--font-head, sans-serif); color: color-mix(in srgb, var(--accent) 25%, transparent); min-width: 64px; margin: 0; }
  .pr3-list .project-desc { display: none; }
  .pr3-list .project-stack { margin: 6px 0 0; }
  .pr3-list .project-actions { justify-content: flex-end; min-width: 120px; }
  @media (max-width: 768px) { .pr3-list .project-card { grid-template-columns: 1fr; } .pr3-list .project-num { display:none; } .pr3-list .project-desc { display:block; } .pr3-list .project-actions { justify-content: flex-start; } }
</style>
<section id="projects" class="pr3">
  <div class="pr3-eyebrow">Selected Work</div>
  <h2 class="pr3-heading">Projects</h2>
  <div class="pr3-list">{{PROJECTS_LOOP}}</div>
</section>
