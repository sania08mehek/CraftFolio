<style>
  .ct3 { padding: 96px 60px; background: var(--bg); }
  .ct3-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; }
  .ct3-heading { font: 800 clamp(2.2rem,5vw,3.5rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1.5px; margin-bottom: 48px; }
  .ct3-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius-lg, 16px); overflow: hidden; }
  .ct3-list .cert-card { border-radius: 0; border: none; display: flex; align-items: center; gap: 24px; }
  .ct3-list .cert-card:hover { transform: none; background: color-mix(in srgb, var(--accent) 5%, var(--surface)); }
  .ct3-list .cert-name { margin: 0; flex: 1; }
  .ct3-list .cert-issuer-badge { margin: 0; min-width: 140px; }
  .ct3-list .cert-meta { margin: 0; padding: 0; border: none; }
</style>
<section id="certifications" class="ct3">
  <div class="ct3-eyebrow">Credentials</div>
  <h2 class="ct3-heading">Certifications</h2>
  <div class="ct3-list">{{CERTS_LOOP}}</div>
</section>
