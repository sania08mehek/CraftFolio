<style>
  .ct1 { padding: 96px 60px; background: var(--bg); }
  .ct1-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; }
  .ct1-heading { font: 800 clamp(2.2rem,5vw,3.5rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1.5px; margin-bottom: 14px; }
  .ct1-sub { font: 400 1rem/1.75 var(--font-body, sans-serif); color: var(--text-2); max-width: 520px; margin-bottom: 48px; }
  .ct1-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
</style>
<section id="certifications" class="ct1">
  <div class="ct1-eyebrow">Credentials</div>
  <h2 class="ct1-heading">Certifications</h2>
  <p class="ct1-sub">Professional credentials and industry-recognized qualifications.</p>
  <div class="ct1-grid">{{CERTS_LOOP}}</div>
</section>
