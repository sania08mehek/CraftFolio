<style>
  .ct2 { padding: 96px 60px; background: var(--bg); }
  .ct2-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px; flex-wrap: wrap; gap: 20px; }
  .ct2-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
  .ct2-heading { font: 800 clamp(2rem,4vw,3rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1.5px; }
  .ct2-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  @media (max-width: 640px) { .ct2-grid { grid-template-columns: 1fr; } }
</style>
<section id="certifications" class="ct2">
  <div class="ct2-header">
    <div>
      <div class="ct2-eyebrow">Qualifications</div>
      <h2 class="ct2-heading">Certifications</h2>
    </div>
  </div>
  <div class="ct2-grid">{{CERTS_LOOP}}</div>
</section>
