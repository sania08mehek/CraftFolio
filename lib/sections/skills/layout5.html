<!-- SKILLS · Layout 5 · Warm Editorial -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>


.skills5{background:var(--bg);padding:80px 48px;font-family:'Plus Jakarta Sans',sans-serif}
  .skills5-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:300px 1fr;gap:80px;align-items:start}
  .skills5-left .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--accent-2);margin-bottom:12px}
  .skills5-title{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:700;color:var(--accent);line-height:1.1}
  .skills5-title em{font-style:italic;font-weight:400}
  .skills5-divider{width:48px;height:2px;background:var(--accent);margin:24px 0}
  .skills5-note{font-size:14px;color:var(--text-2);line-height:1.8}
  .skills5-right{display:flex;flex-direction:column;gap:0}
  .skills5-category{
    border-top:1px solid rgba(44,24,16,.15);
  }
  .skills5-cat-title{
    font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--accent-2);
    padding:20px 0 12px;border-bottom:1px solid rgba(44,24,16,.15);margin-bottom:0;
  }
  .skills5-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 0;border-bottom:1px solid rgba(44,24,16,.07);
    font-size:15px;color:#4a2a18;
  }
  .skills5-item:last-child{border-bottom:1px solid rgba(44,24,16,.15)}
  .skills5-item-right{display:flex;align-items:center;gap:16px}
  .skills5-pct-bar{width:80px;height:2px;background:rgba(44,24,16,.1)}
  .skills5-pct-fill{height:100%;background:var(--accent);animation:bfill5 1s ease both;transform-origin:left}
  @keyframes bfill5{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .skills5-pct-label{font-size:12px;color:var(--accent-2);min-width:28px;text-align:right}


</style>
<section id="skills" class="skills5">
  <div class="skills5-inner">
    <div class="skills5-left">
      <div class="eyebrow">Expertise</div>
      <h2 class="skills5-title">What I<br><em>bring</em> to<br>the table</h2>
      <div class="skills5-divider"></div>
      <p class="skills5-note">5+ years across frontend, backend, and cloud infrastructure.</p>
    </div>
    <div class="skills5-right">
      <div class="skills5-category">
        <div class="skills5-cat-title">Frontend</div>
        <div class="skills5-item"><span>React / Next.js</span><div class="skills5-item-right"><div class="skills5-pct-bar"><div class="skills5-pct-fill" style="width:95%;animation-delay:.1s"></div></div><span class="skills5-pct-label">95%</span></div></div>
        <div class="skills5-item"><span>TypeScript</span><div class="skills5-item-right"><div class="skills5-pct-bar"><div class="skills5-pct-fill" style="width:93%;animation-delay:.15s"></div></div><span class="skills5-pct-label">93%</span></div></div>
        <div class="skills5-item"><span>CSS / Animations</span><div class="skills5-item-right"><div class="skills5-pct-bar"><div class="skills5-pct-fill" style="width:88%;animation-delay:.2s"></div></div><span class="skills5-pct-label">88%</span></div></div>
      </div>
      <div class="skills5-category">
        <div class="skills5-cat-title">Backend</div>
        <div class="skills5-item"><span>Node.js / Python</span><div class="skills5-item-right"><div class="skills5-pct-bar"><div class="skills5-pct-fill" style="width:90%;animation-delay:.25s"></div></div><span class="skills5-pct-label">90%</span></div></div>
        <div class="skills5-item"><span>PostgreSQL / Redis</span><div class="skills5-item-right"><div class="skills5-pct-bar"><div class="skills5-pct-fill" style="width:80%;animation-delay:.3s"></div></div><span class="skills5-pct-label">80%</span></div></div>
        <div class="skills5-item"><span>AWS / Docker</span><div class="skills5-item-right"><div class="skills5-pct-bar"><div class="skills5-pct-fill" style="width:74%;animation-delay:.35s"></div></div><span class="skills5-pct-label">74%</span></div></div>
      </div>
    </div>
  </div>
</section>
