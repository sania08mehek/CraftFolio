<!-- SKILLS · Layout 1 · Midnight Dark (Animated Chips + Bars) -->
<!-- Placeholders: {{SKILLS_LOOP}} -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&display=swap" rel="stylesheet">

<style>


.skills1 {
    background: var(--bg); padding: 80px 48px;
    font-family: var(--font-body), sans-serif;
  }
  .skills1-inner { max-width: 1100px; margin: 0 auto; }
  .skills1-eyebrow {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 8px;
  }
  .skills1-title {
    font-family: var(--font-head), sans-serif;
    font-size: clamp(28px,4vw,44px); font-weight: 800;
    letter-spacing: -0.02em; color: var(--text); margin-bottom: 48px;
  }
  .skills1-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .skills1-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 20px;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
    border-radius: 30px; font-size: 14px; color: var(--accent-2);
    cursor: default; transition: all 0.25s;
    animation: chipIn 0.4s ease both;
  }
  .skills1-chip:hover {
    background: color-mix(in srgb, var(--accent) 22%, transparent);
    border-color: rgba(99,102,241,0.5);
    transform: translateY(-3px);
    box-shadow: 0 8px 25px color-mix(in srgb, var(--accent) 25%, transparent);
    color: var(--accent-3);
  }
  .skills1-chip::before {
    content: ''; width: 6px; height: 6px;
    background: var(--accent); border-radius: 50%; opacity: 0.7;
  }
  @keyframes chipIn {
    from{opacity:0;transform:scale(0.9) translateY(8px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }

  /* Bars section below */
  .skills1-bars { margin-top: 56px; }
  .skills1-bars-title {
    font-family: var(--font-head), sans-serif; font-size: 18px; font-weight: 700;
    color: var(--text); margin-bottom: 28px; letter-spacing: -0.01em;
  }
  .skills1-bar-item { margin-bottom: 20px; }
  .skills1-bar-header {
    display: flex; justify-content: space-between; margin-bottom: 8px;
    font-size: 14px; color: var(--text-2);
  }
  .skills1-bar-pct { color: var(--text-3); font-size: 13px; }
  .skills1-bar-bg {
    height: 4px; background: var(--border); border-radius: 2px;
    overflow: hidden;
  }
  .skills1-bar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    animation: barGrow 1.2s cubic-bezier(.4,0,.2,1) both;
    transform-origin: left;
  }
  @keyframes barGrow { from{transform:scaleX(0)} to{transform:scaleX(1)} }


</style>

<section id="skills" class="skills1">
  <div class="skills1-inner">
    <div class="skills1-eyebrow">Expertise</div>
    <h2 class="skills1-title">Skills &amp; Technologies</h2>

    <div class="skills1-grid">
      {{SKILLS_LOOP}}
      <!-- example chip:
      <span class="skills1-chip">React</span>
      <span class="skills1-chip">TypeScript</span>
      <span class="skills1-chip">Node.js</span>
      -->
    </div>

    <div class="skills1-bars">
      <div class="skills1-bars-title">Core Proficiencies</div>
      <div class="skills1-bar-item">
        <div class="skills1-bar-header">
          <span>React / TypeScript</span>
          <span class="skills1-bar-pct">95%</span>
        </div>
        <div class="skills1-bar-bg">
          <div class="skills1-bar-fill" style="width:95%;animation-delay:.1s"></div>
        </div>
      </div>
      <div class="skills1-bar-item">
        <div class="skills1-bar-header">
          <span>Node.js / Express</span>
          <span class="skills1-bar-pct">90%</span>
        </div>
        <div class="skills1-bar-bg">
          <div class="skills1-bar-fill" style="width:90%;animation-delay:.2s"></div>
        </div>
      </div>
      <div class="skills1-bar-item">
        <div class="skills1-bar-header">
          <span>Python / FastAPI</span>
          <span class="skills1-bar-pct">82%</span>
        </div>
        <div class="skills1-bar-bg">
          <div class="skills1-bar-fill" style="width:82%;animation-delay:.3s"></div>
        </div>
      </div>
      <div class="skills1-bar-item">
        <div class="skills1-bar-header">
          <span>AWS / DevOps</span>
          <span class="skills1-bar-pct">75%</span>
        </div>
        <div class="skills1-bar-bg">
          <div class="skills1-bar-fill" style="width:75%;animation-delay:.4s"></div>
        </div>
      </div>
    </div>
  </div>
</section>
