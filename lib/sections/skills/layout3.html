<!-- SKILLS · Layout 3 · Neon Cyber (Animated Hex Grid) -->
<!-- Placeholders: {{SKILLS_LOOP}} -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>


.skills3{background:#020209;padding:80px 48px;font-family:var(--font-body),sans-serif;position:relative;overflow:hidden}
  .skills3::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,200,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,200,0.03) 1px,transparent 1px);background-size:40px 40px;animation:cgrid 12s linear infinite}
  @keyframes cgrid{from{background-position:0 0}to{background-position:40px 40px}}
  .skills3-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1}
  .skills3-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,255,200,0.4);margin-bottom:8px}
  .skills3-title{font-family:var(--font-head),sans-serif;font-size:clamp(36px,5vw,60px);letter-spacing:.04em;color:var(--text);margin-bottom:48px;line-height:1}
  .skills3-title span{color:var(--accent);text-shadow:0 0 20px rgba(0,255,200,0.5)}

  .skills3-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:48px}
  .skills3-card{
    border:1px solid rgba(0,255,200,0.12);border-radius:8px;
    padding:20px 16px;text-align:center;
    background:rgba(0,255,200,0.03);
    transition:all .25s;cursor:default;position:relative;overflow:hidden;
    animation:cardIn3 .4s ease both;
  }
  .skills3-card::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(0,255,200,0.06),transparent);
    opacity:0;transition:opacity .2s;
  }
  .skills3-card:hover{
    border-color:rgba(0,255,200,0.4);transform:translateY(-4px);
    box-shadow:0 8px 30px var(--border),0 0 0 1px color-mix(in srgb, var(--accent) 10%, transparent);
  }
  .skills3-card:hover::before{opacity:1}
  .skills3-card-icon{font-size:26px;margin-bottom:10px;filter:drop-shadow(0 0 6px rgba(0,255,200,0.4))}
  .skills3-card-name{font-size:13px;color:rgba(232,255,248,0.8);font-weight:500}
  .skills3-card-level{font-size:11px;color:var(--accent);margin-top:4px;letter-spacing:.04em}
  @keyframes cardIn3{from{opacity:0;transform:scale(0.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}

  /* Circular radar chart visual */
  .skills3-radar{
    display:grid;grid-template-columns:repeat(5,1fr);gap:16px;
    margin-top:16px;
  }
  .skills3-bar-item{position:relative}
  .skills3-bar-label{font-size:12px;color:rgba(232,255,248,.5);margin-bottom:6px}
  .skills3-bar-track{height:3px;background:color-mix(in srgb, var(--accent) 10%, transparent);border-radius:2px;overflow:hidden}
  .skills3-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:2px;animation:barGrow3 1s ease both}
  @keyframes barGrow3{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1)}}
  .skills3-bar-val{font-size:11px;color:var(--accent);margin-top:4px;font-weight:600}


</style>
<section id="skills" class="skills3">
  <div class="skills3-inner">
    <div class="skills3-eyebrow">[ Tech Stack ]</div>
    <h2 class="skills3-title">Skills &amp; <span>Abilities</span></h2>
    <div class="skills3-cards">
      {{SKILLS_LOOP}}
      <!-- example:
      <div class="skills3-card"><div class="skills3-card-icon">⚛️</div><div class="skills3-card-name">React</div><div class="skills3-card-level">Expert</div></div>
      <div class="skills3-card"><div class="skills3-card-icon">🟦</div><div class="skills3-card-name">TypeScript</div><div class="skills3-card-level">Expert</div></div>
      -->
    </div>
    <div class="skills3-radar">
      <div class="skills3-bar-item"><div class="skills3-bar-label">React</div><div class="skills3-bar-track"><div class="skills3-bar-fill" style="width:95%;animation-delay:.1s"></div></div><div class="skills3-bar-val">95</div></div>
      <div class="skills3-bar-item"><div class="skills3-bar-label">Node.js</div><div class="skills3-bar-track"><div class="skills3-bar-fill" style="width:90%;animation-delay:.2s"></div></div><div class="skills3-bar-val">90</div></div>
      <div class="skills3-bar-item"><div class="skills3-bar-label">Python</div><div class="skills3-bar-track"><div class="skills3-bar-fill" style="width:82%;animation-delay:.3s"></div></div><div class="skills3-bar-val">82</div></div>
      <div class="skills3-bar-item"><div class="skills3-bar-label">SQL</div><div class="skills3-bar-track"><div class="skills3-bar-fill" style="width:80%;animation-delay:.4s"></div></div><div class="skills3-bar-val">80</div></div>
      <div class="skills3-bar-item"><div class="skills3-bar-label">AWS</div><div class="skills3-bar-track"><div class="skills3-bar-fill" style="width:72%;animation-delay:.5s"></div></div><div class="skills3-bar-val">72</div></div>
    </div>
  </div>
</section>
