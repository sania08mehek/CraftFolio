<style>
  .sk3 { padding: 96px 60px; background: var(--bg); display: grid; grid-template-columns: 1fr 2fr; gap: 64px; align-items: start; }
  .sk3-left { position: sticky; top: 80px; }
  .sk3-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 14px; }
  .sk3-heading { font: 800 clamp(2rem,4vw,3rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1px; margin-bottom: 20px; }
  .sk3-desc { font: 400 14px/1.8 var(--font-body, sans-serif); color: var(--text-2); }
  .sk3-right { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius-lg, 16px); overflow: hidden; }
  .sk3-right .skill-chip { border-radius: 0; border: none; background: var(--surface); padding: 18px 22px; font-size: 14px; justify-content: flex-start; }
  .sk3-right .skill-chip:hover { background: color-mix(in srgb, var(--accent) 10%, var(--surface)); border-radius: 0; }
  @media (max-width: 768px) { .sk3 { grid-template-columns: 1fr; } .sk3-left { position: static; } }
</style>
<section id="skills" class="sk3">
  <div class="sk3-left">
    <div class="sk3-eyebrow">Tech Stack</div>
    <h2 class="sk3-heading">Skills &amp; Tools</h2>
    <p class="sk3-desc">A curated list of technologies I work with daily to build reliable, performant applications.</p>
  </div>
  <div class="sk3-right">{{SKILLS_LOOP}}</div>
</section>
