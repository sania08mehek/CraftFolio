<!-- SKILLS · Layout 2 · Light Minimal -->
<!-- Placeholders: {{SKILLS_LOOP}} -->
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>


.skills2{background:var(--bg);padding:80px 48px;font-family:var(--font-body),sans-serif}
  .skills2-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 2fr;gap:64px;align-items:start}
  .skills2-left .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-3);margin-bottom:8px}
  .skills2-title{font-family:var(--font-head),serif;font-size:38px;color:var(--accent);line-height:1.1;margin-bottom:24px}
  .skills2-desc{font-size:15px;color:var(--text-2);line-height:1.8}
  .skills2-right{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .skills2-group-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .skills2-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0ede6;font-size:14px;color:var(--accent-2)}
  .skills2-item:last-child{border-bottom:none}
  .skills2-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px}
  .tag-expert{background:#eaf3de;color:#3b6d11}
  .tag-advanced{background:#e6f1fb;color:#185fa5}
  .tag-mid{background:#faeeda;color:#854f0b}


</style>
<section id="skills" class="skills2">
  <div class="skills2-inner">
    <div class="skills2-left">
      <div class="eyebrow">Expertise</div>
      <h2 class="skills2-title">What I Work With</h2>
      <p class="skills2-desc">5+ years building full-stack products. Always learning, always shipping.</p>
    </div>
    <div class="skills2-right">
      <div class="skills2-group">
        <div class="skills2-group-title">Frontend</div>
        <div class="skills2-item"><span>React / Next.js</span><span class="skills2-tag tag-expert">Expert</span></div>
        <div class="skills2-item"><span>TypeScript</span><span class="skills2-tag tag-expert">Expert</span></div>
        <div class="skills2-item"><span>CSS / Animation</span><span class="skills2-tag tag-advanced">Advanced</span></div>
        <div class="skills2-item"><span>Figma</span><span class="skills2-tag tag-advanced">Advanced</span></div>
      </div>
      <div class="skills2-group">
        <div class="skills2-group-title">Backend &amp; Infra</div>
        <div class="skills2-item"><span>Node.js / Python</span><span class="skills2-tag tag-expert">Expert</span></div>
        <div class="skills2-item"><span>PostgreSQL / Redis</span><span class="skills2-tag tag-advanced">Advanced</span></div>
        <div class="skills2-item"><span>Docker / AWS</span><span class="skills2-tag tag-mid">Intermediate</span></div>
        <div class="skills2-item"><span>CI/CD</span><span class="skills2-tag tag-mid">Intermediate</span></div>
      </div>
    </div>
  </div>
</section>
