<style>
  .sk2 { padding: 96px 60px; background: var(--bg); }
  .sk2-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px; flex-wrap: wrap; gap: 20px; }
  .sk2-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
  .sk2-heading { font: 800 clamp(2rem,4vw,3rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1.5px; }
  .sk2-count { font: 700 3rem/1 var(--font-head, sans-serif); color: var(--accent); }
  .sk2-count-label { font: 13px var(--font-body, sans-serif); color: var(--text-3); }
  .sk2-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .sk2-grid .skill-chip { width: 100%; justify-content: center; border-radius: var(--radius-md, 12px); padding: 14px 16px; font-size: 14px; }
</style>
<section id="skills" class="sk2">
  <div class="sk2-header">
    <div>
      <div class="sk2-eyebrow">Expertise</div>
      <h2 class="sk2-heading">My Tech Stack</h2>
    </div>
  </div>
  <div class="sk2-grid">{{SKILLS_LOOP}}</div>
</section>
