<style>
  .a1-about {
    padding: 96px 60px; background: var(--bg);
    display: grid; grid-template-columns: 1fr 1.2fr; gap: 80px; align-items: center;
  }
  .a1-avatar-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  .a1-avatar {
    width: 220px; height: 220px; border-radius: 50%;
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 20%, transparent), color-mix(in srgb, var(--accent-2) 15%, transparent));
    border: 2px solid var(--border); display: flex; align-items: center;
    justify-content: center; font: 700 5rem var(--font-head, sans-serif); color: var(--accent);
  }
  .a1-facts { width: 100%; display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius-lg, 16px); overflow: hidden; }
  .a1-fact { display: flex; justify-content: space-between; padding: 14px 20px; background: var(--surface); }
  .a1-fact-key { font: 11px var(--font-mono, monospace); color: var(--text-3); letter-spacing: 1px; text-transform: uppercase; }
  .a1-fact-val { font: 600 13px var(--font-body, sans-serif); color: var(--text); }
  .a1-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 14px; }
  .a1-heading { font: 800 clamp(2rem,4vw,3rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1px; margin-bottom: 24px; }
  .a1-bio { font: 400 1rem/1.85 var(--font-body, sans-serif); color: var(--text-2); margin-bottom: 32px; }
  .a1-links { display: flex; gap: 12px; flex-wrap: wrap; }
  .a1-link {
    padding: 10px 22px; border: 1px solid var(--border-2); border-radius: var(--radius-sm, 8px);
    font: 500 13px var(--font-body, sans-serif); color: var(--text-2); text-decoration: none;
    transition: all 0.2s;
  }
  .a1-link:hover { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
  @media (max-width: 768px) { .a1-about { grid-template-columns: 1fr; } }
</style>
<section id="about" class="a1-about">
  <div class="a1-avatar-wrap">
    <div class="a1-avatar">{{NAME}}</div>
    <div class="a1-facts">
      <div class="a1-fact"><span class="a1-fact-key">Role</span><span class="a1-fact-val">Developer</span></div>
      <div class="a1-fact"><span class="a1-fact-key">Status</span><span class="a1-fact-val">Open to Work</span></div>
      <div class="a1-fact"><span class="a1-fact-key">Mode</span><span class="a1-fact-val">Remote / Hybrid</span></div>
    </div>
  </div>
  <div>
    <div class="a1-eyebrow">About Me</div>
    <h2 class="a1-heading">{{NAME}}</h2>
    <p class="a1-bio">{{BIO}}</p>
    <div class="a1-links">
      <a class="a1-link" href="{{GITHUB}}" target="_blank" rel="noopener">GitHub ↗</a>
      <a class="a1-link" href="{{LINKEDIN}}" target="_blank" rel="noopener">LinkedIn ↗</a>
      <a class="a1-link" href="mailto:{{EMAIL}}">Email Me</a>
    </div>
  </div>
</section>
