<style>
  .a3-about {
    padding: 96px 60px; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .a3-eyebrow { font: 11px var(--font-mono, monospace); color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 14px; }
  .a3-heading { font: 800 clamp(2.2rem,5vw,3.5rem)/1.1 var(--font-head, sans-serif); color: var(--text); letter-spacing: -1.5px; margin-bottom: 32px; }
  .a3-divider { width: 64px; height: 2px; background: var(--accent); margin: 0 auto 32px; }
  .a3-bio { font: 400 1.05rem/1.9 var(--font-body, sans-serif); color: var(--text-2); max-width: 680px; margin-bottom: 52px; }
  .a3-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .a3-tag {
    padding: 12px 24px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg, 16px); font: 500 14px var(--font-body, sans-serif); color: var(--text-2);
    display: flex; align-items: center; gap: 8px; transition: all 0.2s; text-decoration: none;
  }
  .a3-tag:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
  .a3-tag-icon { font-size: 1.2rem; }
</style>
<section id="about" class="a3-about">
  <div class="a3-eyebrow">About Me</div>
  <h2 class="a3-heading">{{NAME}}</h2>
  <div class="a3-divider"></div>
  <p class="a3-bio">{{BIO}}</p>
  <div class="a3-row">
    <a class="a3-tag" href="{{GITHUB}}" target="_blank" rel="noopener"><span class="a3-tag-icon">🐙</span>GitHub</a>
    <a class="a3-tag" href="{{LINKEDIN}}" target="_blank" rel="noopener"><span class="a3-tag-icon">💼</span>LinkedIn</a>
    <a class="a3-tag" href="mailto:{{EMAIL}}"><span class="a3-tag-icon">✉️</span>{{EMAIL}}</a>
    <a class="a3-tag" href="#projects"><span class="a3-tag-icon">🚀</span>View Projects</a>
  </div>
</section>
